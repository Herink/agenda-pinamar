<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agenda Pinamar — Eventos</title>
<style>
  :root{
    --arena: #f3ede1;
    --marea: #0f5c66;
    --marea-oscura: #0a3f47;
    --sol: #e8a33d;
    --texto: #1c2b2e;
    --tarjeta: #ffffff;
    --linea: #d8cfba;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--arena);
    color: var(--texto);
    font-family: "Georgia", "Iowan Old Style", serif;
    -webkit-font-smoothing: antialiased;
  }

  header{
    position: relative;
    padding: 3.5rem 1.5rem 4.5rem;
    background: linear-gradient(180deg, var(--marea) 0%, var(--marea-oscura) 100%);
    color: #fdf9ef;
    overflow: hidden;
  }

  header::after{
    /* línea de marea: una ola quieta en el borde inferior */
    content:"";
    position:absolute;
    left:0; right:0; bottom:-1px;
    height: 28px;
    background:
      radial-gradient(circle at 10px 0, transparent 12px, var(--arena) 13px) 0 -12px / 24px 24px repeat-x;
  }

  header h1{
    margin:0;
    font-size: clamp(2rem, 5vw, 3rem);
    letter-spacing: 0.02em;
    font-weight: 400;
  }

  header .eyebrow{
    font-family: "Helvetica Neue", Arial, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    font-size: 0.72rem;
    color: var(--sol);
    margin-bottom: 0.9rem;
  }

  header p.sub{
    font-family: "Helvetica Neue", Arial, sans-serif;
    max-width: 46ch;
    opacity: 0.85;
    font-size: 0.95rem;
    margin-top: 0.6rem;
  }

  main{
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 5rem;
  }

  #estado{
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.9rem;
    color: #6b6353;
    margin-bottom: 1.5rem;
  }

  .grilla{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.6rem;
  }

  .tarjeta{
    background: var(--tarjeta);
    border: 1px solid var(--linea);
    display: flex;
    flex-direction: column;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .tarjeta:hover{
    transform: translateY(-3px);
    box-shadow: 0 10px 24px rgba(15, 92, 102, 0.14);
  }

  .tarjeta .imagen-wrap{
    position: relative;
    aspect-ratio: 4 / 5;
    overflow: hidden;
    background: var(--linea);
  }

  .tarjeta .imagen-wrap img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .tarjeta .fecha-chip{
    position: absolute;
    top: 0.7rem;
    left: 0.7rem;
    background: var(--marea-oscura);
    color: #fdf9ef;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 0.3rem 0.6rem;
  }

  .tarjeta .cuerpo{
    padding: 1.1rem 1.2rem 1.3rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    flex: 1;
  }

  .tarjeta h3{
    margin: 0;
    font-size: 1.15rem;
    line-height: 1.3;
    font-weight: 600;
  }

  .tarjeta h3 a{
    color: var(--texto);
    text-decoration: none;
  }
  .tarjeta h3 a:hover{ color: var(--marea); }

  .horario{
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.82rem;
    color: var(--marea);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .horario::before{
    content: "";
    width: 7px; height: 7px;
    background: var(--sol);
    border-radius: 50%;
    display: inline-block;
  }

  .descripcion{
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.85rem;
    color: #504a3f;
    line-height: 1.5;
    margin: 0;
  }

  details.detalle{
    margin-top: 0.3rem;
    font-family: "Helvetica Neue", Arial, sans-serif;
  }

  details.detalle summary{
    cursor: pointer;
    font-size: 0.78rem;
    color: var(--marea);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    list-style: none;
  }
  details.detalle summary::-webkit-details-marker{ display:none; }
  details.detalle summary::before{
    content: "+ ";
  }
  details.detalle[open] summary::before{
    content: "– ";
  }

  details.detalle p{
    font-size: 0.85rem;
    color: #504a3f;
    line-height: 1.55;
    margin: 0.5rem 0 0;
  }

  .vacio, .error{
    font-family: "Helvetica Neue", Arial, sans-serif;
    padding: 3rem 1rem;
    text-align: center;
    color: #6b6353;
  }

  .error{ color: #9b3b3b; }

  footer{
    text-align:center;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.75rem;
    color: #9a927c;
    padding-bottom: 2rem;
  }

  /* --- Modal de detalle --- */
  .tarjeta button.abrir-detalle{
    all: unset;
    display: flex;
    flex-direction: column;
    width: 100%;
    cursor: pointer;
    text-align: left;
    color: inherit;
  }
  .tarjeta:hover h3{
    color: var(--marea);
  }

  .modal-overlay{
    position: fixed;
    inset: 0;
    background: rgba(10, 22, 24, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease;
  }
  .modal-overlay.abierto{
    opacity: 1;
    pointer-events: auto;
  }

  .modal{
    background: var(--tarjeta);
    max-width: 640px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    position: relative;
    transform: translateY(12px);
    transition: transform 0.18s ease;
  }
  .modal-overlay.abierto .modal{
    transform: translateY(0);
  }

  .modal .modal-imagen{
    width: 100%;
    aspect-ratio: 16 / 10;
    background: var(--linea);
    overflow: hidden;
  }
  .modal .modal-imagen img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .modal .modal-cerrar{
    all: unset;
    position: absolute;
    top: 0.7rem;
    right: 0.7rem;
    width: 32px;
    height: 32px;
    background: rgba(10, 22, 24, 0.55);
    color: #fdf9ef;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 1.1rem;
    line-height: 1;
  }
  .modal .modal-cerrar:hover{ background: rgba(10, 22, 24, 0.8); }

  .modal .modal-cuerpo{
    padding: 1.6rem 1.8rem 2rem;
  }

  .modal .modal-fecha-chip{
    display: inline-block;
    background: var(--marea-oscura);
    color: #fdf9ef;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 0.3rem 0.6rem;
    margin-bottom: 0.8rem;
  }

  .modal h2{
    margin: 0 0 0.4rem;
    font-size: 1.5rem;
    line-height: 1.3;
  }

  .modal .modal-horario{
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.88rem;
    color: var(--marea);
    margin-bottom: 1rem;
  }

  .modal .modal-descripcion,
  .modal .modal-detalle{
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.92rem;
    line-height: 1.6;
    color: #3a352c;
  }

  .modal .modal-detalle{
    margin-top: 0.8rem;
    padding-top: 0.8rem;
    border-top: 1px solid var(--linea);
  }

  .modal .modal-fuente{
    display: inline-block;
    margin-top: 1.4rem;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.8rem;
    color: #9a927c;
    text-decoration: none;
    border-bottom: 1px solid #d8cfba;
  }
  .modal .modal-fuente:hover{ color: var(--marea); border-color: var(--marea); }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Costa Atlántica · Buenos Aires</div>
  <h1>Agenda de Pinamar</h1>
  <p class="sub">Eventos, salidas y actividades actualizados automáticamente desde agenda.pinamar.gob.ar</p>
</header>

<main>
  <div id="estado">Cargando eventos…</div>
  <div class="grilla" id="grilla"></div>
</main>

<footer>Datos obtenidos de agenda.pinamar.gob.ar — actualizado por el scraper local</footer>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true" id="modalContenido">
    <!-- Se completa dinámicamente al abrir -->
  </div>
</div>

<script>
  async function cargarEventos() {
    const estado = document.getElementById('estado');
    const grilla = document.getElementById('grilla');

    try {
      const resp = await fetch('eventos_pinamar.json', { cache: 'no-store' });
      if (!resp.ok) throw new Error('No se encontró eventos_pinamar.json (código ' + resp.status + ')');
      const eventos = await resp.json();

      if (!eventos.length) {
        estado.innerHTML = '';
        grilla.innerHTML = '<p class="vacio">No hay eventos cargados todavía. Corré el scraper primero.</p>';
        return;
      }

      estado.textContent = eventos.length + ' eventos encontrados';

      // Guardamos los eventos en una variable global para poder
      // encontrarlos de nuevo al abrir el modal (por índice)
      window._eventosPinamar = eventos;

      grilla.innerHTML = eventos.map((ev, i) => `
        <article class="tarjeta">
          <button class="abrir-detalle" type="button" onclick="abrirModal(${i})">
            <div class="imagen-wrap">
              ${ev.imagen ? `<img src="${ev.imagen}" alt="${escapeHtml(ev.titulo)}" loading="lazy">` : ''}
              ${ev.fecha ? `<div class="fecha-chip">${escapeHtml(ev.fecha)}</div>` : ''}
            </div>
            <div class="cuerpo">
              <h3>${escapeHtml(ev.titulo)}</h3>
              ${ev.horario ? `<div class="horario">${escapeHtml(ev.horario)}</div>` : ''}
              ${ev.descripcion ? `<p class="descripcion">${escapeHtml(ev.descripcion)}</p>` : ''}
            </div>
          </button>
        </article>
      `).join('');

    } catch (err) {
      estado.innerHTML = '';
      grilla.innerHTML = `<p class="error">Error al cargar los eventos: ${escapeHtml(err.message)}<br>
        Asegurate de correr el scraper primero y de abrir esta página desde un servidor local (no con doble clic).</p>`;
    }
  }

  function abrirModal(indice) {
    const ev = window._eventosPinamar[indice];
    if (!ev) return;

    const contenido = document.getElementById('modalContenido');
    contenido.innerHTML = `
      <button class="modal-cerrar" type="button" onclick="cerrarModal()" aria-label="Cerrar">✕</button>
      ${ev.imagen ? `<div class="modal-imagen"><img src="${ev.imagen}" alt="${escapeHtml(ev.titulo)}"></div>` : ''}
      <div class="modal-cuerpo">
        ${ev.fecha ? `<span class="modal-fecha-chip">${escapeHtml(ev.fecha)}</span>` : ''}
        <h2>${escapeHtml(ev.titulo)}</h2>
        ${ev.horario ? `<div class="modal-horario">${escapeHtml(ev.horario)}</div>` : ''}
        ${ev.descripcion ? `<p class="modal-descripcion">${escapeHtml(ev.descripcion)}</p>` : ''}
        ${ev.detalle ? `<p class="modal-detalle">${escapeHtml(ev.detalle)}</p>` : ''}
        ${ev.url_evento ? `<a class="modal-fuente" href="${ev.url_evento}" target="_blank" rel="noopener">Ver publicación original ↗</a>` : ''}
      </div>
    `;

    document.getElementById('modalOverlay').classList.add('abierto');
    document.body.style.overflow = 'hidden';
  }

  function cerrarModal() {
    document.getElementById('modalOverlay').classList.remove('abierto');
    document.body.style.overflow = '';
  }

  // Cerrar al hacer click afuera del modal, o con la tecla Escape
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target.id === 'modalOverlay') cerrarModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') cerrarModal();
  });

  function escapeHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  cargarEventos();
</script>

</body>
</html>
