name: Actualizar eventos Pinamar

on:
  schedule:
    # Corre todos los días a las 09:00 UTC (06:00 hora Argentina)
    - cron: "0 9 * * *"
  workflow_dispatch: # permite correrlo manualmente desde la pestaña "Actions"

permissions:
  contents: write

jobs:
  scrapear:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Correr el scraper
        run: python scraper_agenda_pinamar.py

      - name: Guardar cambios en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eventos_pinamar.json eventos_pinamar.csv
          git diff --staged --quiet || git commit -m "Actualizar eventos (automático)"
          git push
